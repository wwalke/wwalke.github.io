<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>D. Wade Walke</title>
</head>
<body>
    <div class="container">

        <div class="flip-container" id="flipCard">
            <div class="flip-inner" id="flipInner">

                <!-- FRONT of card -->
                <div class="card flip-front" id="flipFront">
                    <div class="logo">
                        <img src="assets/Logo.png" alt="">
                    </div>
                    <div class="textInfo">
                        <div class="name">D. WADE WALKE, Ph.D.</div>
                        <div class="title">SENIOR VICE PRESIDENT</div>
                        <div class="title">INVESTOR RELATIONS</div>
                        <div class="contact">
                            <a href="mailto:wwalke&#64;ionis.com">wwalke&#64;ionis.com</a>
                            <br>
                            <a href="tel:7604737035">M: (760) 473-7035</a>
                        </div>
                    </div>
                    <div class="wings">
                        <img src="assets/wings.jpg" alt="">
                    </div>
                </div>

                <!-- BACK of card -->
                <div class="card-back flip-back" id="flipBack">
                    <div class="back-content">
                        <img
                            class="qr-code"
                            src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://wadewalke.com&color=5C6167&bgcolor=ffffff"
                            alt="QR code for wadewalke.com"
                        >
                        <p class="qr-label">wadewalke.com</p>
                    </div>
                </div>

            </div>
            <div class="flip-hint">tap to flip ↺</div>
        </div>

        <div class="iosCard">
            <a href="assets/wadewalke.pkpass" download>
                <img src="assets/AddToWallet.svg" alt="">
            </a>
        </div>

    </div>

    <script>
        var card    = document.getElementById('flipCard');
        var inner   = document.getElementById('flipInner');
        var front   = document.getElementById('flipFront');
        var back    = document.getElementById('flipBack');
        var flipped = false;

        // Start with back hidden
        back.style.visibility = 'hidden';

        card.addEventListener('click', function () {
            flipped = !flipped;
            inner.style.transform = flipped ? 'rotateY(180deg)' : 'rotateY(0deg)';

            if (flipped) {
                setTimeout(function () { front.style.visibility = 'hidden'; }, 350);
                setTimeout(function () { back.style.visibility  = 'visible'; }, 350);
            } else {
                setTimeout(function () { back.style.visibility  = 'hidden'; }, 350);
                setTimeout(function () { front.style.visibility = 'visible'; }, 350);
            }
        });
    </script>
</body>
</html>
